name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: docker-build
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/personal-website:latest
            ${{ secrets.DOCKER_USERNAME }}/personal-website:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/personal-website:${{ github.sha }}

            # Pull new image before stopping old container to minimise downtime
            docker pull $IMAGE

            # Keep track of previous image for rollback (empty string if first deploy)
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' personal-website 2>/dev/null || echo "")

            # Swap containers
            docker stop personal-website || true
            docker rm personal-website || true
            docker run -d \
              --name personal-website \
              --restart always \
              -e PORT=${{ secrets.CONTAINER_PORT }} \
              -p ${{ secrets.SERVER_PORT }}:${{ secrets.CONTAINER_PORT }} \
              $IMAGE

            # Verify container is running
            sleep 5
            if ! docker ps --filter "name=personal-website" --filter "status=running" | grep -q personal-website; then
              echo "Container failed to start"
              docker stop personal-website || true
              docker rm personal-website || true

              if [ -n "$PREVIOUS_IMAGE" ]; then
                echo "Rolling back to $PREVIOUS_IMAGE"
                docker run -d \
                  --name personal-website \
                  --restart always \
                  -e PORT=${{ secrets.CONTAINER_PORT }} \
                  -p ${{ secrets.SERVER_PORT }}:${{ secrets.CONTAINER_PORT }} \
                  $PREVIOUS_IMAGE
              else
                echo "No previous image to roll back to — this was the first deploy"
              fi
              exit 1
            fi

            echo "Deployment successful — running $IMAGE"
