<svg viewBox="0 0 1000 670" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="mDark"   markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#374151"/></marker>
    <marker id="mGreen"  markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#059669"/></marker>
    <marker id="mRed"    markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#dc2626"/></marker>
    <marker id="mGray"   markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#9ca3af"/></marker>
    <marker id="mOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#ea580c"/></marker>
    <marker id="mPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="670" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="500" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">Rate Limiter · Request Flow</text>

  <!-- ── CLIENT ── -->
  <rect x="430" y="30" width="140" height="48" rx="10" fill="white" stroke="#111827" stroke-width="2"/>
  <text x="500" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Client</text>
  <text x="500" y="67" text-anchor="middle" font-size="10" fill="#6b7280">API Request</text>

  <!-- Client → API Service -->
  <line x1="500" y1="78" x2="500" y2="113" stroke="#374151" stroke-width="1.5" marker-end="url(#mDark)"/>

  <!-- ── API SERVICE ── -->
  <rect x="365" y="115" width="270" height="55" rx="10" fill="white" stroke="#111827" stroke-width="2"/>
  <text x="500" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">API Service</text>
  <text x="500" y="157" text-anchor="middle" font-size="10" fill="#6b7280">Limiter Module · Spring Boot</text>

  <!-- API Service → Config Cache: left along bottom edge then down (sequential: config first) -->
  <path d="M 400 170 L 170 170 L 170 223" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#mDark)"/>

  <!-- ── CONFIG CACHE ── -->
  <rect x="65" y="225" width="210" height="82" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#3b82f6">Config Cache</text>
  <text x="170" y="265" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">in-memory · TTL-based</text>
  <text x="170" y="281" text-anchor="middle" font-size="10" fill="#6b7280">per-app rate-limit rules</text>
  <text x="170" y="297" text-anchor="middle" font-size="10" fill="#9ca3af">cached with TTL / background refresh</text>

  <!-- Config Cache → Rate Limit Decision: sequential, labeled (config resolved before check) -->
  <line x1="275" y1="266" x2="553" y2="266" stroke="#374151" stroke-width="1.5" marker-end="url(#mDark)"/>
  <rect x="316" y="252" width="152" height="17" rx="3" fill="white"/>
  <text x="392" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">config resolved →</text>

  <!-- Config Cache → PostgreSQL config: down dashed (cache miss) -->
  <line x1="170" y1="307" x2="170" y2="358" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mGray)"/>
  <rect x="86" y="320" width="124" height="17" rx="3" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="148" y="332" text-anchor="middle" font-size="10" fill="#9ca3af">cache miss / refresh</text>

  <!-- ── POSTGRESQL (config store) ── -->
  <rect x="45" y="360" width="250" height="72" rx="10" fill="white" stroke="#4f46e5" stroke-width="2"/>
  <text x="170" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">PostgreSQL</text>
  <text x="170" y="399" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">config store</text>
  <text x="170" y="415" text-anchor="middle" font-size="10" fill="#6b7280">rate-limit rules · app registration</text>
  <text x="170" y="430" text-anchor="middle" font-size="10" fill="#9ca3af">cached with TTL / background refresh</text>

  <!-- ── RATE LIMIT DECISION ── -->
  <rect x="555" y="225" width="240" height="82" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="675" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Rate Limit Decision</text>
  <text x="675" y="265" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">Lua script · Bucket4j</text>
  <text x="675" y="281" text-anchor="middle" font-size="10" fill="#6b7280">Token Bucket · per-client key</text>
  <text x="675" y="297" text-anchor="middle" font-size="10" fill="#9ca3af">capacity · refill rate · refill period</text>

  <!-- Rate Limit Decision → Redis: down, labeled -->
  <line x1="675" y1="307" x2="675" y2="358" stroke="#ea580c" stroke-width="1.5" marker-end="url(#mOrange)"/>
  <rect x="605" y="320" width="140" height="17" rx="3" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="675" y="332" text-anchor="middle" font-size="10" font-weight="600" fill="#ea580c">atomic check/update</text>

  <!-- ── REDIS ── -->
  <rect x="545" y="360" width="260" height="72" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="675" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Redis</text>
  <text x="675" y="399" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">token buckets · ephemeral SoT</text>
  <text x="675" y="415" text-anchor="middle" font-size="10" fill="#6b7280">Lettuce async · shared across instances</text>
  <text x="675" y="430" text-anchor="middle" font-size="10" fill="#9ca3af">atomic Lua · no race conditions</text>

  <!-- ── FAILURE MODE ANNOTATION (near Redis) ── -->
  <line x1="805" y1="385" x2="814" y2="385" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="814" y="366" width="162" height="38" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="895" y="381" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45309">timeout / network error</text>
  <text x="895" y="396" text-anchor="middle" font-size="9.5" fill="#6b7280">fail-open or fail-closed</text>

  <!-- Redis → Decision Result: step path (shift left toward center) -->
  <path d="M 675 432 L 675 458 L 580 458 L 580 488" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#mDark)"/>

  <!-- ── DECISION RESULT ── -->
  <rect x="445" y="490" width="270" height="65" rx="10" fill="white" stroke="#111827" stroke-width="2"/>
  <text x="580" y="513" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Decision Result</text>
  <text x="580" y="531" text-anchor="middle" font-size="10" fill="#374151">allowed · remaining tokens · retry-after (computed)</text>
  <text x="580" y="547" text-anchor="middle" font-size="10" fill="#9ca3af">returned to API Service</text>

  <!-- Fork stem from Decision Result bottom -->
  <line x1="580" y1="555" x2="580" y2="575" stroke="#374151" stroke-width="1.5"/>
  <circle cx="580" cy="575" r="3.5" fill="#374151"/>

  <!-- Fork → Forward (allow, green): go left then down -->
  <path d="M 580 575 L 350 575 L 350 593" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#mGreen)"/>
  <text x="458" y="569" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">✓ allow</text>

  <!-- Fork → 429 (deny, red): short right then down -->
  <path d="M 580 575 L 612 575 L 612 593" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#mRed)"/>
  <text x="596" y="569" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">✗ deny</text>

  <!-- ── FORWARD REQUEST ── -->
  <rect x="250" y="595" width="200" height="62" rx="10" fill="white" stroke="#059669" stroke-width="2"/>
  <text x="350" y="617" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">200 OK</text>
  <text x="350" y="635" text-anchor="middle" font-size="10" fill="#6b7280">caller proceeds upstream</text>
  <text x="350" y="650" text-anchor="middle" font-size="10" fill="#9ca3af">{allowed: true, remaining tokens: N}</text>

  <!-- ── 429 RESPONSE ── -->
  <rect x="505" y="595" width="215" height="62" rx="10" fill="white" stroke="#dc2626" stroke-width="2"/>
  <text x="612" y="617" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">429 Response</text>
  <text x="612" y="635" text-anchor="middle" font-size="10" fill="#6b7280">Too Many Requests</text>
  <text x="612" y="650" text-anchor="middle" font-size="9.5" fill="#9ca3af">Retry-After · X-RateLimit-Remaining</text>

  <!-- Decision Result → Audit Queue: async dashed arrow (fire-and-forget) -->
  <line x1="715" y1="522" x2="763" y2="522" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mPurple)"/>
  <rect x="716" y="507" width="46" height="15" rx="3" fill="white"/>
  <text x="739" y="518" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">async</text>

  <!-- ── AUDIT QUEUE ── -->
  <rect x="765" y="490" width="180" height="65" rx="10" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <text x="855" y="513" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Audit Queue</text>
  <text x="855" y="531" text-anchor="middle" font-size="10" fill="#374151">async / fire-and-forget</text>
  <text x="855" y="547" text-anchor="middle" font-size="10" fill="#6b7280">all denied · sampled allowed</text>

  <!-- Audit Queue → PostgreSQL audit: down dashed -->
  <line x1="855" y1="555" x2="855" y2="593" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mPurple)"/>

  <!-- ── POSTGRESQL (audit / OLAP) ── -->
  <rect x="765" y="595" width="180" height="74" rx="10" fill="white" stroke="#4f46e5" stroke-width="2"/>
  <text x="855" y="614" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">PostgreSQL</text>
  <text x="855" y="630" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">audit / analytics</text>
  <text x="855" y="645" text-anchor="middle" font-size="10" fill="#9ca3af">access logs · rate events</text>
  <text x="855" y="659" text-anchor="middle" font-size="8.5" fill="#9ca3af" font-style="italic">same instance as config store</text>

</svg>
