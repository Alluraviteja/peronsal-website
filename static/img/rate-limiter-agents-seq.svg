<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 730" font-family="'Inter', system-ui, sans-serif">

<defs>
  <!-- Forward arrow (requests) -->
  <marker id="arr" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
  </marker>
  <!-- Return arrow (responses, dashed) -->
  <marker id="arr-ret" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
  </marker>
  <!-- Write arrow (to Agent DB) -->
  <marker id="arr-write" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
</defs>

<!-- Background -->
<rect width="760" height="730" fill="#f9fafb" rx="12"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- PARTICIPANT BOXES — centers: 70, 220, 370, 520, 670        -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- 1. APScheduler -->
<rect x="10" y="18" width="120" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="70" y="41" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">APScheduler</text>

<!-- 2. Agent Pipeline -->
<rect x="160" y="18" width="120" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="220" y="41" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Agent Pipeline</text>

<!-- 3. Rate Limiter DB (read-only) -->
<rect x="310" y="18" width="120" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
<text x="370" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Rate Limiter DB</text>
<text x="370" y="50" text-anchor="middle" font-size="9.5" fill="#3b82f6">read-only</text>

<!-- 4. LLM Provider -->
<rect x="460" y="18" width="120" height="36" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="520" y="41" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">LLM Provider</text>

<!-- 5. Agent DB (write side) -->
<rect x="610" y="18" width="120" height="36" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
<text x="670" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Agent DB</text>
<text x="670" y="50" text-anchor="middle" font-size="9.5" fill="#059669">write side</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- LIFELINES                                                   -->
<!-- ═══════════════════════════════════════════════════════════ -->
<line x1="70"  y1="54" x2="70"  y2="710" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="220" y1="54" x2="220" y2="710" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="370" y1="54" x2="370" y2="710" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="520" y1="54" x2="520" y2="710" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="670" y1="54" x2="670" y2="710" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="4,3"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- STARTUP SEQUENCE                                            -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- Step 1: APScheduler → Pipeline — interval trigger -->
<line x1="70" y1="98" x2="210" y2="98" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="145" y="91" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">interval trigger (15 min)</text>

<!-- Step 2: Pipeline → Rate DB — query enabled apps -->
<line x1="220" y1="136" x2="360" y2="136" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="295" y="129" text-anchor="middle" font-size="10" fill="#374151">SELECT app_info WHERE enabled</text>

<!-- Step 3: Rate DB → Pipeline — app list returned -->
<line x1="370" y1="172" x2="230" y2="172" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
<text x="295" y="165" text-anchor="middle" font-size="10" fill="#9ca3af">AppInfo list</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- OUTER GROUP: for each enabled app                          -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="152" y="193" width="598" height="450" rx="8" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,4"/>
<text x="160" y="208" font-size="9.5" font-weight="600" fill="#6b7280">for each enabled app (sequential)</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- SUB-GROUP: Agents ①②③                                  -->
  <!-- ─────────────────────────────────────────────────────── -->
  <rect x="160" y="218" width="572" height="203" rx="5" fill="rgba(239,246,255,0.6)" stroke="#bfdbfe" stroke-width="1"/>
  <text x="168" y="232" font-size="9" font-weight="600" fill="#3b82f6">Agents ①②③ (run sequentially, each writes before next starts)</text>

  <!-- Step 4: Agent queries logs -->
  <line x1="220" y1="250" x2="360" y2="250" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="295" y="243" text-anchor="middle" font-size="10" fill="#374151">SELECT logs, last 15 min, LIMIT 5 000</text>

  <!-- Step 5: Rate DB returns rows -->
  <line x1="370" y1="284" x2="230" y2="284" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
  <text x="295" y="277" text-anchor="middle" font-size="10" fill="#9ca3af">log rows → build_summary()</text>

  <!-- Step 6: Agent calls LLM -->
  <line x1="220" y1="318" x2="510" y2="318" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="365" y="311" text-anchor="middle" font-size="10" fill="#374151">complete_with_retry(system_prompt, metrics)</text>

  <!-- Step 7: LLM returns verdict -->
  <line x1="520" y1="352" x2="230" y2="352" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
  <text x="370" y="345" text-anchor="middle" font-size="10" fill="#9ca3af">SEVERITY / REASON / ACTION</text>

  <!-- Step 8: Agent writes result -->
  <line x1="220" y1="390" x2="660" y2="390" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-write)"/>
  <text x="445" y="383" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">INSERT AgentResult (severity, action, reason, cost)</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- SUB-GROUP: Orchestrator ④                              -->
  <!-- ─────────────────────────────────────────────────────── -->
  <rect x="160" y="438" width="572" height="193" rx="5" fill="rgba(245,243,255,0.6)" stroke="#ddd6fe" stroke-width="1"/>
  <text x="168" y="452" font-size="9" font-weight="600" fill="#7c3aed">Orchestrator ④ — two-phase synthesis</text>

  <!-- Step 9: Read baseline + recent history -->
  <line x1="220" y1="470" x2="660" y2="470" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="445" y="463" text-anchor="middle" font-size="10" fill="#374151">SELECT baseline + last 3 OrchestratorResults</text>

  <!-- Step 10: Agent DB returns context -->
  <line x1="670" y1="504" x2="230" y2="504" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
  <text x="450" y="497" text-anchor="middle" font-size="10" fill="#9ca3af">BaselineMemory + recent_history</text>

  <!-- Step 11: Orchestrator calls LLM with all signals -->
  <line x1="220" y1="538" x2="510" y2="538" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="365" y="531" text-anchor="middle" font-size="10" fill="#374151">complete_with_retry(3 agent signals + context)</text>

  <!-- Step 12: LLM returns final verdict -->
  <line x1="520" y1="572" x2="230" y2="572" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
  <text x="370" y="565" text-anchor="middle" font-size="10" fill="#9ca3af">FINAL_SEVERITY / ACTION / REASON</text>

  <!-- Step 13: Orchestrator writes result + updates baseline -->
  <line x1="220" y1="607" x2="660" y2="607" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-write)"/>
  <text x="445" y="600" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">INSERT OrchestratorResult + UPDATE BaselineMemory</text>

<!-- End outer group -->

<!-- Footer note -->
<text x="445" y="667" text-anchor="middle" font-size="10" fill="#9ca3af">↻ pipeline repeats for each remaining app</text>

</svg>
